      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #1f2937;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    #app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #ffffff;
    }
    body.export-mode #app {
      grid-template-rows: 1fr;
    }
    body.export-mode #toolbar {
      display: none;
    }
    body.svg-raster-mode #plot-title,
    body.svg-raster-mode #plot-subtitle,
    body.svg-raster-mode #plot-caption,
    body.svg-raster-mode #outside-guide-layer,
    body.svg-raster-mode #inside-guide-layer {
      visibility: hidden;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid #d1d5db;
      background: #f9fafb;
      z-index: 2;
    }
    button {
      appearance: none;
      border: 1px solid #9ca3af;
      border-radius: 6px;
      background: #ffffff;
      color: #111827;
      font: inherit;
      font-size: 13px;
      line-height: 1;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover {
      background: #f3f4f6;
    }
    #status {
      margin-left: auto;
      color: #6b7280;
      font-size: 12px;
      white-space: nowrap;
    }
    #figure-root {
      position: relative;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      background: #ffffff;
      overflow: hidden;
    }
    #plot-title,
    #plot-subtitle,
    #plot-caption {
      display: none;
      min-width: 0;
    }
    #figure-body {
      min-width: 0;
      min-height: 0;
      display: grid;
      gap: 12px;
      align-items: center;
    }
    #scene-viewport {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    #abs-label-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }
    #axis-label-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }
    .scene3d-axis-label {
      position: absolute;
      left: 0;
      top: 0;
      color: #4b5563;
      font-size: 10px;
      line-height: 1;
      white-space: nowrap;
      text-rendering: geometricPrecision;
      transform-origin: center center;
      will-change: transform;
      user-select: none;
    }
    .scene3d-axis-title {
      color: #374151;
      font-size: 11px;
      font-weight: 500;
    }
    #outside-guide-layer {
      min-width: 0;
      min-height: 0;
      display: grid;
      align-content: center;
      justify-content: start;
      gap: 8px;
      pointer-events: none;
      z-index: 2;
    }
    #inside-guide-layer {
      position: absolute;
      left: 0;
      top: 0;
      display: grid;
      gap: 8px;
      max-width: min(260px, calc(100vw - 28px));
      pointer-events: none;
      z-index: 2;
    }
    .scene3d-guide {
      border: 1px solid rgba(209, 213, 219, 0.92);
      border-radius: 0;
      background: rgba(255, 255, 255, 0.9);
      color: #111827;
      padding: 8px;
      font-size: 12px;
      line-height: 1.25;
      box-shadow: 0 1px 4px rgba(17, 24, 39, 0.08);
    }
    .scene3d-guide-title {
      font-weight: 600;
      margin-bottom: 6px;
    }
    .scene3d-guide-row {
      display: grid;
      grid-template-columns: 12px 1fr;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .scene3d-guide-swatch {
      width: 12px;
      height: 12px;
      border: 1px solid rgba(17, 24, 39, 0.18);
      border-radius: 2px;
    }
    .scene3d-colorbar-ramp {
      width: 140px;
      height: 10px;
      border: 1px solid rgba(17, 24, 39, 0.18);
      border-radius: 2px;
    }
    .scene3d-colorbar-range {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
      color: #4b5563;
      font-variant-numeric: tabular-nums;
    }
    .abs-label {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate3d(0, 0, 0) translateY(-50%);
      will-change: transform;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.94);
      color: #111827;
      font-size: 12px;
      line-height: 1.2;
      padding: 4px 6px;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(17, 24, 39, 0.08);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }
    canvas.dragging {
      cursor: grabbing;
    }
    #fallback {
      position: absolute;
      left: 12px;
      bottom: 12px;
      max-width: min(520px, calc(100vw - 24px));
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: #4b5563;
      font-size: 12px;
      line-height: 1.4;
    }
  </style>

      bounds.min.min(new THREE.Vector3(x, y, z));

    function computeAspectScale(coordinateSystem) {
      const aspect = coordinateSystem?.aspect || {};
      const ratio = aspect.ratio || [1, 1, 1];
      const domain = coordinateSystem?.domain || {};

        const value = domain[axis] || [-1, 1];
        return Math.max(Math.abs(Number(value[1]) - Number(value[0])), 1e-9);
      });
      const target = Math.max(
        ranges[0] / Math.max(Number(ratio[0]) || 1, 1e-9),
        ranges[1] / Math.max(Number(ratio[1]) || 1, 1e-9),
        ranges[2] / Math.max(Number(ratio[2]) || 1, 1e-9)

      return new THREE.Vector3(
        target * (Number(ratio[0]) || 1) / ranges[0],
        target * (Number(ratio[1]) || 1) / ranges[1],

          positions[idx * 3 + 1] = py;
          positions[idx * 3 + 2] = pz;
          includePoint(px, py, pz);
        }
      }

      const indices = buildSurfaceGridIndices(nx, ny, layer.data.tessellation || "rect", layer.data.mask || null);

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();

      const materialOpacity = layer.material?.opacity ?? 0.65;
      const fill = new THREE.Color(layer.material?.fill || "#4477AA");
      let material;

      if (layer.data.alpha && layer.data.alpha.length === nx * ny) {
        const alpha = new Float32Array(nx * ny);
        for (let i = 0; i < alpha.length; i += 1) {
          alpha[i] = THREE.MathUtils.clamp(Number(layer.data.alpha[i]), 0, 1);
        }
        geometry.setAttribute("alpha", new THREE.BufferAttribute(alpha, 1));
        material = new THREE.ShaderMaterial({
          uniforms: {
            fillColor: { value: fill },
            opacity: { value: materialOpacity }
          },
          vertexShader: `
            attribute float alpha;
            varying float vAlpha;
            void main() {
              vAlpha = alpha;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform vec3 fillColor;
            uniform float opacity;
            varying float vAlpha;
            void main() {
              gl_FragColor = vec4(fillColor, opacity * vAlpha);
            }
          `,
          transparent: true,
          depthWrite: false,
          side: THREE.DoubleSide
        });
      } else {
        material = new THREE.MeshBasicMaterial({
          color: fill,
          opacity: materialOpacity,
          transparent: materialOpacity < 1,
          side: THREE.DoubleSide,
          depthWrite: materialOpacity >= 1
        });
      }

      world.add(new THREE.Mesh(geometry, material));
    }

    function addSurfaceMesh(layer) {
      const data = layer.data || {};
      const positions = new Float32Array((data.vertices || []).map(Number));
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setIndex((data.faces || []).map((value) => Number(value)));

      if (data.normals && data.normals.length === positions.length) {
        geometry.setAttribute("normal", new THREE.Float32BufferAttribute(data.normals.map(Number), 3));
      } else {
        geometry.computeVertexNormals();
      }

      let vertexColors = false;
      if (data.colors && data.colors.length * 3 === positions.length) {
        const colors = new Float32Array(data.colors.length * 3);
        const color = new THREE.Color();
        for (let i = 0; i < data.colors.length; i += 1) {
          color.set(data.colors[i] || layer.material?.fill || "#4477AA");
          colors[i * 3] = color.r;
          colors[i * 3 + 1] = color.g;
          colors[i * 3 + 2] = color.b;
        }
        geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
        vertexColors = true;
      }

      for (let i = 0; i < positions.length; i += 3) {
        includePoint(positions[i], positions[i + 1], positions[i + 2]);
      }

      const opacity = layer.material?.opacity ?? 0.65;
      const material = new THREE.MeshBasicMaterial({
        color: new THREE.Color(layer.material?.fill || "#4477AA"),
        vertexColors,
        opacity,
        transparent: opacity < 1,
        side: THREE.DoubleSide,
        depthWrite: opacity >= 1
      });
      world.add(new THREE.Mesh(geometry, material));
    }

    function addPolylineStack(layer, key) {
      const items = layer.data?.[key] || [];
      const material = new THREE.LineBasicMaterial({
        color: new THREE.Color(layer.style?.color || "#374151"),
        transparent: (layer.style?.opacity ?? 1) < 1,
        opacity: layer.style?.opacity ?? 1
      });
      const group = new THREE.Group();
      group.name = layer.name || layer.type;

      for (const item of items) {
        const n = Math.min(item.x?.length || 0, item.y?.length || 0, item.z?.length || 0);
        if (n < 2) continue;
        const positions = new Float32Array(n * 3);
        for (let i = 0; i < n; i += 1) {
          const x = Number(item.x[i]);
          const y = Number(item.y[i]);
          const z = Number(item.z[i]);
          positions[i * 3] = x;
          positions[i * 3 + 1] = y;
          positions[i * 3 + 2] = z;
          includePoint(x, y, z);
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        group.add(new THREE.Line(geometry, material.clone()));
      }
      world.add(group);
    }

    function addScenePanels(panelSpec) {
      const faces = panelSpec?.faces || [];
      if (!faces.length) return null;
      const domain = sceneData.coordinateSystem?.domain || {};
      const style = panelSpec.style || {};
      const fill = themeColor(style.fill, "#E5E5E5");
      const alpha = Number(style.alpha ?? 1);
      const dynamicBackFaces = panelSpec.dynamicBackFaces === true;
      const material = new THREE.MeshBasicMaterial({
        color: new THREE.Color(fill),
        opacity: alpha,
        transparent: alpha < 1,
        depthWrite: false,
        side: THREE.DoubleSide
      });
      const items = [];
      for (const face of faces) {
        const geometry = panelGeometry(face, domain);
        if (!geometry) continue;
        const mesh = new THREE.Mesh(geometry, material.clone());
        mesh.renderOrder = -100;
        sceneGroup.add(mesh);
        const grid = panelGridLines(face, domain, sceneData.axes?.grid, sceneData.theme);
        if (grid) sceneGroup.add(grid);
        items.push({ face, mesh, grid });
      }
      function update() {
        const active = dynamicBackFaces ? cameraBackFaces(domain) : new Set(faces);
        for (const item of items) {
          const visible = active.has(item.face);
          item.mesh.visible = visible;
          if (item.grid) item.grid.visible = visible;
        }
      }
      return { update };
    }

    function cameraBackFaces(domain) {
      const center = domainCenterDisplay(domain);
      const cameraPos = camera?.position || new THREE.Vector3(1, -1, 1);
      const faces = new Set();
      faces.add(cameraPos.z >= center.z ? "xy_min" : "xy_max");
      faces.add(cameraPos.y >= center.y ? "xz_min" : "xz_max");
      faces.add(cameraPos.x >= center.x ? "yz_min" : "yz_max");
      return faces;
    }

    function domainCenterDisplay(domain) {
      const xr = domain.x || [-1, 1];
      const yr = domain.y || [-1, 1];
      const zr = domain.z || [-1, 1];
      return dataArrayToDisplayVector([
        (Number(xr[0]) + Number(xr[1])) / 2,
        (Number(yr[0]) + Number(yr[1])) / 2,
        (Number(zr[0]) + Number(zr[1])) / 2
      ]);
    }

    function panelGridLines(face, domain, gridSpec, theme) {
      if (!gridSpec || gridSpec.visible === false) return null;
      const positions = [];
      const breaks = gridSpec.majorBreaks || {};
      const offset = 0.0005;
      if (face.startsWith("xy_")) {
        addFacePlaneLines(positions, "x", "y", "z", face.endsWith("_min") ? "min" : "max", domain, breaks, offset);
      } else if (face.startsWith("xz_")) {
        addFacePlaneLines(positions, "x", "z", "y", face.endsWith("_min") ? "min" : "max", domain, breaks, offset);
      } else if (face.startsWith("yz_")) {
        addFacePlaneLines(positions, "y", "z", "x", face.endsWith("_min") ? "min" : "max", domain, breaks, offset);
      }
      if (!positions.length) return null;
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      const material = new THREE.LineBasicMaterial({
        color: new THREE.Color(themeColor(theme?.axis?.["grid.major"], "#FFFFFF", "colour")),
        transparent: true,
        opacity: theme?.axis?.["grid.major"]?.alpha ?? 0.95
      });
      const lines = new THREE.LineSegments(geometry, material);
      lines.renderOrder = -90;
      return lines;
    }

    function addFacePlaneLines(positions, axisA, axisB, constantAxis, side, domain, breaks, offset) {
      const aDomain = domain[axisA] || [-1, 1];
      const bDomain = domain[axisB] || [-1, 1];
      const cDomain = domain[constantAxis] || [-1, 1];
      const aBreaks = breaks[axisA] || niceBreaks(aDomain);
      const bBreaks = breaks[axisB] || niceBreaks(bDomain);
      const sign = side === "min" ? -1 : 1;
      const constantValue = Number(side === "min" ? cDomain[0] : cDomain[1]) + sign * offset;
      const aMin = Math.min(...aDomain);
      const aMax = Math.max(...aDomain);
      const bMin = Math.min(...bDomain);
      const bMax = Math.max(...bDomain);
      const aEps = Math.max(Math.abs(aMax - aMin), 1) * 1e-9;
      const bEps = Math.max(Math.abs(bMax - bMin), 1) * 1e-9;
      for (const a of aBreaks) {
        if (a <= aMin + aEps || a >= aMax - aEps) continue;
        pushAxisPlaneLine(positions, axisA, axisB, constantAxis, a, bDomain[0], bDomain[1], constantValue);
      }
      for (const b of bBreaks) {
        if (b <= bMin + bEps || b >= bMax - bEps) continue;
        pushAxisPlaneLine(positions, axisB, axisA, constantAxis, b, aDomain[0], aDomain[1], constantValue);
      }
    }

    function panelGeometry(face, domain) {
      const xr = domain.x || [-1, 1];
      const yr = domain.y || [-1, 1];
      const zr = domain.z || [-1, 1];
      const x0 = Number(xr[0]), x1 = Number(xr[1]);
      const y0 = Number(yr[0]), y1 = Number(yr[1]);
      const z0 = Number(zr[0]), z1 = Number(zr[1]);
      const z = face.endsWith("_min") ? z0 : z1;
      const y = face.endsWith("_min") ? y0 : y1;
      const x = face.endsWith("_min") ? x0 : x1;
      let positions;
      if (face.startsWith("xy_")) {
        positions = [x0, y0, z, x1, y0, z, x1, y1, z, x0, y1, z];
      } else if (face.startsWith("xz_")) {
        positions = [x0, y, z0, x1, y, z0, x1, y, z1, x0, y, z1];
      } else if (face.startsWith("yz_")) {
        positions = [x, y0, z0, x, y1, z0, x, y1, z1, x, y0, z1];
      } else {
        return null;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      geometry.setIndex([0, 1, 2, 0, 2, 3]);
      return geometry;
    }

    function addFaceProjection(layer) {
      const styleType = layer.style?.type || "density_grid";
      if (styleType === "points") {
        addFacePointsProjection(layer);
      } else if (styleType === "path" || styleType === "contour_lines") {
        addFacePolylineProjection(layer);
      } else if (styleType === "source_points") {
        addSourcePointFaceProjection(layer);
      } else {
        addFaceGridProjection(layer);
      }
    }

    function addSourcePointFaceProjection(layer) {
      const source = layerById.get(layer.sourceLayerId);
      const columns = source?.data?.columns || {};
      const n = Math.min(columns.x?.length || 0, columns.y?.length || 0, columns.z?.length || 0);
      if (!source || n === 0) return;
      const faces = layer.faces || [];
      const domain = sceneData.coordinateSystem?.domain || {};
      const color = new THREE.Color();
      for (const face of faces) {
        const positions = new Float32Array(n * 3);
        const colors = new Float32Array(n * 3);
        for (let i = 0; i < n; i += 1) {
          const point = sourceFacePoint(face, Number(columns.x[i]), Number(columns.y[i]), Number(columns.z[i]), domain, Number(layer.offset || 0));
          positions[i * 3] = point[0];
          positions[i * 3 + 1] = point[1];
          positions[i * 3 + 2] = point[2];
          color.set(columns.color?.[i] || "#3366CC");
          colors[i * 3] = color.r;
          colors[i * 3 + 1] = color.g;
          colors[i * 3 + 2] = color.b;
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
        const opacity = average(columns.alpha, 1) * (layer.style?.alphaMultiplier ?? 0.45);
        const material = new THREE.PointsMaterial({
          size: average(columns.size, 3) * (layer.style?.sizeMultiplier ?? 0.8),
          vertexColors: true,
          opacity,
          transparent: opacity < 1,
          depthWrite: false,
          sizeAttenuation: false
        });
        world.add(new THREE.Points(geometry, material));
      }
    }

    function sourceFacePoint(face, x, y, z, domain, offset) {
      const xr = domain.x || [-1, 1];
      const yr = domain.y || [-1, 1];
      const zr = domain.z || [-1, 1];
      if (face === "xy_min") return [x, y, Number(zr[0]) - offset];
      if (face === "xy_max") return [x, y, Number(zr[1]) + offset];
      if (face === "xz_min") return [x, Number(yr[0]) - offset, z];
      if (face === "xz_max") return [x, Number(yr[1]) + offset, z];
      if (face === "yz_min") return [Number(xr[0]) - offset, y, z];
      if (face === "yz_max") return [Number(xr[1]) + offset, y, z];
      return [x, y, z];
    }

    function addFaceGridProjection(layer) {
      const data = layer.data || {};
      const x = data.x || [];
      const y = data.y || [];
      const nx = data.shape?.[0] || x.length;
      const ny = data.shape?.[1] || y.length;
      const positions = new Float32Array(nx * ny * 3);

      for (let i = 0; i < nx; i += 1) {
        for (let j = 0; j < ny; j += 1) {
          const idx = i * ny + j;
          const point = faceProjectionPoint(layer, Number(x[i]), Number(y[j]));
          positions[idx * 3] = point[0];
          positions[idx * 3 + 1] = point[1];
          positions[idx * 3 + 2] = point[2];
          includePoint(point[0], point[1], point[2]);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setIndex(buildSurfaceGridIndices(nx, ny, data.tessellation || "rect", data.mask || null));
      geometry.computeVertexNormals();

      const fill = new THREE.Color(layer.style?.fill || "#4477AA");
      const opacity = layer.style?.opacity ?? 0.5;
      let material;
      if (data.alpha && data.alpha.length === nx * ny) {
        const alpha = new Float32Array(nx * ny);
        for (let i = 0; i < alpha.length; i += 1) {
          alpha[i] = THREE.MathUtils.clamp(Number(data.alpha[i]), 0, 1);
        }
        geometry.setAttribute("alpha", new THREE.BufferAttribute(alpha, 1));
        material = new THREE.ShaderMaterial({
          uniforms: {
            fillColor: { value: fill },
            opacity: { value: opacity }
          },
          vertexShader: `
            attribute float alpha;
            varying float vAlpha;
            void main() {
              vAlpha = alpha;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform vec3 fillColor;
            uniform float opacity;
            varying float vAlpha;
            void main() {
              gl_FragColor = vec4(fillColor, opacity * vAlpha);
            }
          `,
          transparent: true,
          depthWrite: false,
          side: THREE.DoubleSide
        });
      } else {
        material = new THREE.MeshBasicMaterial({
          color: fill,
          opacity,
          transparent: opacity < 1,
          depthWrite: false,
          side: THREE.DoubleSide
        });
      }
      const mesh = new THREE.Mesh(geometry, material);
      mesh.name = layer.name || "face_projection";
      world.add(mesh);
    }

    function addFacePointsProjection(layer) {
      const columns = layer.data?.columns || {};
      const n = Math.min(columns.x?.length || 0, columns.y?.length || 0);
      const positions = new Float32Array(n * 3);
      const colors = new Float32Array(n * 3);
      const color = new THREE.Color();

      for (let i = 0; i < n; i += 1) {
        const point = faceProjectionPoint(layer, Number(columns.x[i]), Number(columns.y[i]));
        positions[i * 3] = point[0];
        positions[i * 3 + 1] = point[1];
        positions[i * 3 + 2] = point[2];
        includePoint(point[0], point[1], point[2]);
        color.set(columns.color?.[i] || "#3366CC");
        colors[i * 3] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      const opacity = average(columns.alpha, 1);
      const material = new THREE.PointsMaterial({
        size: average(columns.size, 3),
        vertexColors: true,
        opacity,
        transparent: opacity < 1,
        depthWrite: false,
        sizeAttenuation: false
      });
      world.add(new THREE.Points(geometry, material));
    }

    function addFacePolylineProjection(layer) {
      const items = layer.data?.polylines || [];
      const material = new THREE.LineBasicMaterial({
        color: new THREE.Color(layer.style?.color || "#374151"),
        transparent: (layer.style?.opacity ?? 1) < 1,
        opacity: layer.style?.opacity ?? 1
      });
      const group = new THREE.Group();
      group.name = layer.name || layer.type;

      for (const item of items) {
        const n = Math.min(item.x?.length || 0, item.y?.length || 0);
        if (n < 2) continue;
        const positions = new Float32Array(n * 3);
        for (let i = 0; i < n; i += 1) {
          const point = faceProjectionPoint(layer, Number(item.x[i]), Number(item.y[i]));
          positions[i * 3] = point[0];
          positions[i * 3 + 1] = point[1];
          positions[i * 3 + 2] = point[2];
          includePoint(point[0], point[1], point[2]);
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        group.add(new THREE.Line(geometry, material.clone()));
      }
      world.add(group);
    }

    function faceProjectionPoint(layer, u, v) {
      const axes = layer.axes || ["x", "y"];
      const point = [0, 0, 0];
      point[axisIndex(axes[0])] = u;
      point[axisIndex(axes[1])] = v;

      const plane = layer.plane || "zmin";
      const offset = Number(layer.offset || 0);
      const domain = sceneData.coordinateSystem?.domain || {};
      const origin = sceneData.coordinateSystem?.origin || [0, 0, 0];
      const constantAxis = faceConstantAxis(plane);
      const constantIdx = axisIndex(constantAxis);
      point[constantIdx] = faceConstantValue(plane, constantAxis, domain, origin) + offset;
      return point;
    }

    function faceConstantAxis(plane) {
      if (plane === "xy" || plane === "zmin" || plane === "zmax") return "z";
      if (plane === "xz" || plane === "ymin" || plane === "ymax") return "y";
      if (plane === "yz" || plane === "xmin" || plane === "xmax") return "x";
      return "z";
    }

    function faceConstantValue(plane, axis, domain, origin) {
      const range = domain[axis] || [-1, 1];
      if (plane.endsWith("min")) return Number(range[0]);
      if (plane.endsWith("max")) return Number(range[1]);
      return Number(origin[axisIndex(axis)] || 0);
    }

    function buildSurfaceGridIndices(nx, ny, tessellation, mask) {
      const indices = [];
      for (let i = 0; i < nx - 1; i += 1) {
        for (let j = 0; j < ny - 1; j += 1) {
          const a = i * ny + j;
          const b = (i + 1) * ny + j;
          const c = (i + 1) * ny + (j + 1);
          const d = i * ny + (j + 1);
          if (mask && !(mask[a] && mask[b] && mask[c] && mask[d])) continue;

          const mode = tessellation === "equilateral"
            ? ((i + j) % 2 === 0 ? "right1" : "right2")
            : tessellation;
          if (mode === "right2") {
            indices.push(a, b, c, a, c, d);
          } else {
            indices.push(a, b, d, b, c, d);
          }
        }
      }
      return indices;
    }

    function average(values, fallback) {
      if (!values || values.length === 0) return fallback;
      let total = 0;
      for (const value of values) total += Number(value);
      return total / values.length;
    }

    function computeBounds() {
      if (!Number.isFinite(bounds.min.x)) {
        bounds.min.set(-1, -1, -1);
        bounds.max.set(1, 1, 1);
      }
      const displayMin = dataToDisplayVector(bounds.min);
      const displayMax = dataToDisplayVector(bounds.max);
      const center = displayMin.clone().add(displayMax).multiplyScalar(0.5);
      const size = displayMax.clone().sub(displayMin);
      const radius = Math.max(size.x, size.y, size.z, 1) * 0.75;
      return { center, size, radius };
    }

    const layerById = new Map((sceneData.layers || []).map((layer) => [layer.id, layer]));

    for (const layer of sceneData.layers || []) {
      if (layer.visible === false) continue;
      if (layer.type === "point_cloud") addPointCloud(layer);
      if (layer.type === "polyline3d") addPolylineStack(layer, "polylines");
      if (layer.type === "surface_grid") addSurfaceGrid(layer);
      if (layer.type === "surface_mesh") addSurfaceMesh(layer);
      if (layer.type === "contour_stack") addPolylineStack(layer, "polylines");
      if (layer.type === "ridgeline_stack") addPolylineStack(layer, "profiles");
      if (layer.type === "face_projection") addFaceProjection(layer);
    }

    addLights();
    const fit = computeBounds();
    const scenePanels = addScenePanels(sceneData.panels);

    function buildGridLines(gridSpec, theme) {
      if (!gridSpec || gridSpec.visible === false) return null;
      const positions = [];
      const domain = gridSpec.domain || sceneData.coordinateSystem?.domain || {};
      const origin = gridSpec.origin || sceneData.coordinateSystem?.origin || [0, 0, 0];
      const breaks = gridSpec.majorBreaks || {};
      const planes = gridSpec.planes || ["xy"];

      for (const plane of planes) {
        if (plane === "xy") {
          addPlaneLines(positions, "x", "y", "z", domain, breaks, origin);
        } else if (plane === "xz") {
          addPlaneLines(positions, "x", "z", "y", domain, breaks, origin);
        } else if (plane === "yz") {
          addPlaneLines(positions, "y", "z", "x", domain, breaks, origin);
        }
      }

      if (positions.length === 0) return null;
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      const material = new THREE.LineBasicMaterial({
        color: new THREE.Color(themeColor(theme?.axis?.["grid.major"], "#D9DDE3", "colour")),
        transparent: true,
        opacity: 0.85
      });
      return new THREE.LineSegments(geometry, material);
    }

    function buildAxisLines(axesSpec, coordinateSystem, theme) {
      const gridSpec = axesSpec?.grid || {};
      const domain = gridSpec.domainMode === "positive" || gridSpec.domainMode === "negative"
        ? (gridSpec.domain || coordinateSystem?.domain || {})
        : (coordinateSystem?.domain || {});
      const axisStyle = axesSpec?.style || {};
      const axisLengthFraction = THREE.MathUtils.clamp(Number(axisStyle.lengthFraction ?? gridSpec.axisLengthFraction ?? 1), 0.01, 1);
      const axisArrows = (axisStyle.arrows ?? gridSpec.axisArrows) === true;

      const geometry = new THREE.BufferGeometry();
      const positionAttribute = new THREE.Float32BufferAttribute(new Float32Array(18), 3);
      geometry.setAttribute("position", positionAttribute);
      const material = new THREE.LineBasicMaterial({
        color: new THREE.Color(themeColor(theme?.axis?.line, "#4B5563", "colour"))
      });
      const line = new THREE.LineSegments(geometry, material);
      line.frustumCulled = false;
      return {
        group: line,
        update() {
          if (!camera) return;
          const rect = renderer.domElement.getBoundingClientRect();
          const edges = selectAxisEdges(domain, Math.max(rect.width, 1), Math.max(rect.height, 1));
          const positions = [];
          if (axesSpec?.x?.visible !== false) addAxisEdgeWithArrow(positions, edges.x, axisLengthFraction, axisArrows);
          if (axesSpec?.y?.visible !== false) addAxisEdgeWithArrow(positions, edges.y, axisLengthFraction, axisArrows);
          if (axesSpec?.z?.visible !== false) addAxisEdgeWithArrow(positions, edges.z, axisLengthFraction, axisArrows);
          const needed = Math.max(positions.length, 18);
          if (positionAttribute.array.length < needed) {
            geometry.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(needed), 3));
          }
          const attr = geometry.getAttribute("position");
          attr.array.fill(0);
          attr.array.set(positions);
          attr.needsUpdate = true;
          geometry.setDrawRange(0, positions.length / 3);
          geometry.computeBoundingSphere();
        }
      };
    }

    function addAxisEdgeWithArrow(positions, edge, fraction, arrows) {
      if (!edge) return;
      const start = edge.start.slice();
      const end = [
        edge.start[0] + (edge.end[0] - edge.start[0]) * fraction,
        edge.start[1] + (edge.end[1] - edge.start[1]) * fraction,
        edge.start[2] + (edge.end[2] - edge.start[2]) * fraction
      ];
      pushLine(positions, start, end);

      if (!arrows) return;
      const length = Math.hypot(end[0] - start[0], end[1] - start[1], end[2] - start[2]);
      if (!Number.isFinite(length) || length <= 0) return;
      const direction = new THREE.Vector3(end[0] - start[0], end[1] - start[1], end[2] - start[2]).normalize();
      const view = camera.position.clone().sub(new THREE.Vector3(end[0], end[1], end[2])).normalize();
      const side = new THREE.Vector3().crossVectors(direction, view).normalize().multiplyScalar(length * 0.045);
      const base = new THREE.Vector3(end[0], end[1], end[2]).sub(direction.multiplyScalar(length * 0.09));
      pushLine(positions, end, base.clone().add(side).toArray());
      pushLine(positions, end, base.clone().sub(side).toArray());
    }

    function addPlaneLines(positions, axisA, axisB, constantAxis, domain, breaks, origin) {
      const aDomain = domain[axisA] || [-1, 1];
      const bDomain = domain[axisB] || [-1, 1];
      const aBreaks = breaks[axisA] || niceBreaks(aDomain);
      const bBreaks = breaks[axisB] || niceBreaks(bDomain);
      const constantValue = origin[axisIndex(constantAxis)] ?? 0;

      for (const a of aBreaks) {
        if (a < Math.min(...aDomain) || a > Math.max(...aDomain)) continue;
        pushAxisPlaneLine(positions, axisA, axisB, constantAxis, a, bDomain[0], bDomain[1], constantValue);
      }
      for (const b of bBreaks) {
        if (b < Math.min(...bDomain) || b > Math.max(...bDomain)) continue;
        pushAxisPlaneLine(positions, axisB, axisA, constantAxis, b, aDomain[0], aDomain[1], constantValue);
      }
    }

    function pushAxisPlaneLine(positions, fixedAxis, varyingAxis, constantAxis, fixedValue, startValue, endValue, constantValue) {
      const start = [0, 0, 0];
      const end = [0, 0, 0];
      start[axisIndex(fixedAxis)] = fixedValue;
      end[axisIndex(fixedAxis)] = fixedValue;
      start[axisIndex(varyingAxis)] = startValue;
      end[axisIndex(varyingAxis)] = endValue;
      start[axisIndex(constantAxis)] = constantValue;
      end[axisIndex(constantAxis)] = constantValue;
      pushLine(positions, start, end);
    }

    function pushLine(positions, start, end) {
      positions.push(start[0], start[1], start[2], end[0], end[1], end[2]);
    }

    function axisIndex(axis) {
      return { x: 0, y: 1, z: 2 }[axis];
    }

    function niceBreaks(domain) {
      const min = Number(domain[0]);
      const max = Number(domain[1]);
      if (!Number.isFinite(min) || !Number.isFinite(max) || min === max) return [min || 0];
      const out = [];
      const step = (max - min) / 5;
      for (let i = 0; i <= 5; i += 1) out.push(min + step * i);
      return out;
    }

    function selectAxisEdges(domain, width, height) {
      const xr = domain.x || [-1, 1];
      const yr = domain.y || [-1, 1];
      const zr = domain.z || [-1, 1];
      const x0 = Number(xr[0]), x1 = Number(xr[1]);
      const y0 = Number(yr[0]), y1 = Number(yr[1]);
      const z0 = Number(zr[0]), z1 = Number(zr[1]);
      const edges = {
        x: [
          edge("x", [x0, y0, z0], [x1, y0, z0]),
          edge("x", [x0, y1, z0], [x1, y1, z0]),
          edge("x", [x0, y0, z1], [x1, y0, z1]),
          edge("x", [x0, y1, z1], [x1, y1, z1])
        ],
        y: [
          edge("y", [x0, y0, z0], [x0, y1, z0]),
          edge("y", [x1, y0, z0], [x1, y1, z0]),
          edge("y", [x0, y0, z1], [x0, y1, z1]),
          edge("y", [x1, y0, z1], [x1, y1, z1])
        ],
        z: [
          edge("z", [x0, y0, z0], [x0, y0, z1]),
          edge("z", [x1, y0, z0], [x1, y0, z1]),
          edge("z", [x0, y1, z0], [x0, y1, z1]),
          edge("z", [x1, y1, z0], [x1, y1, z1])
        ]
      };
      return {
        x: chooseScreenEdge(edges.x, width, height, "bottom"),
        y: chooseScreenEdge(edges.y, width, height, "bottom"),
        z: chooseScreenEdge(edges.z, width, height, "left")
      };
    }

    function edge(axis, start, end) {
      return { axis, start, end };
    }

    function chooseScreenEdge(edges, width, height, mode) {
      let best = edges[0];
      let bestScore = -Infinity;
      for (const item of edges) {
        const a = worldToViewport(dataArrayToDisplayVector(item.start), width, height);
        const b = worldToViewport(dataArrayToDisplayVector(item.end), width, height);
        const midX = (a.x + b.x) / 2;
        const midY = (a.y + b.y) / 2;
        const length = Math.hypot(a.x - b.x, a.y - b.y);
        const visible = Number.isFinite(a.z) && Number.isFinite(b.z);
        if (!visible || length < 4) continue;
        const score = mode === "left"
          ? -midX + length * 0.01
          : midY + length * 0.01 - Math.abs(midX - width / 2) * 0.02;
        if (score > bestScore) {
          bestScore = score;
          best = item;
        }
      }
      return best;
    }

    function edgePoint(edge, value) {
      const out = edge.start.slice();
      out[axisIndex(edge.axis)] = value;
      return out;
    }

    function buildAxisSprites(axesSpec, coordinateSystem, theme) {
      axisLabelLayer.innerHTML = "";
      const labels = [];
      const axisStyle = axesSpec?.style || {};
      const gridSpec = axesSpec?.grid || {};
      const domain = gridSpec.domainMode === "positive" || gridSpec.domainMode === "negative"
        ? (gridSpec.domain || coordinateSystem?.domain || {})
        : (coordinateSystem?.domain || {});
      const breaks = gridSpec.majorBreaks || {};
      const origin = coordinateSystem?.origin || [0, 0, 0];
      const textStyle = theme?.axis?.text || {};
      const titleStyle = theme?.axis?.title || {};
      const color = themeColor(textStyle, "#4D4D4D", "colour");
      const tickSize = theme?.axis?.text?.size || 9;
      const titleSize = theme?.axis?.title?.size || 11;
      const tickOffset = Number(axisStyle.tickOffset ?? 18);
      const titleOffset = Number(axisStyle.titleOffset ?? 42);
      const titlePosition = THREE.MathUtils.clamp(Number(axisStyle.titlePosition ?? 0.5), 0, 1);

      for (const axis of ["x", "y", "z"]) {
        if (axesSpec?.[axis]?.visible === false) continue;
        const range = domain[axis] || [-1, 1];
        const values = breaks[axis] || niceBreaks(range);
        if (axisStyle.labels !== false && axesSpec?.labelPlacement !== "none") {
          for (const value of values) {
            if (value < Math.min(...range) || value > Math.max(...range)) continue;
            const el = createAxisLabelElement(formatTick(value), {
              size: tickSize,
              color,
              family: textStyle.family || "",
              title: false
            });
            axisLabelLayer.appendChild(el);
            labels.push({ el, axis, value: Number(value), offset: tickOffset, title: false });
          }
        }

        if (axisStyle.titles !== false && axesSpec?.labelPlacement !== "none") {
          const title = axesSpec?.[axis]?.title || axis;
          const titleValue = Number(range[0]) + (Number(range[1]) - Number(range[0])) * titlePosition;
          const el = createAxisLabelElement(title, {
            size: titleSize,
            color: themeColor(titleStyle, color, "colour"),
            family: titleStyle.family || "",
            title: true
          });
          axisLabelLayer.appendChild(el);
          labels.push({ el, axis, value: titleValue, offset: titleOffset, title: true });
        }
      }

      return {
        update() {
          if (!camera) return;
          const rect = renderer.domElement.getBoundingClientRect();
          const width = Math.max(rect.width, 1);
          const height = Math.max(rect.height, 1);
          const edges = selectAxisEdges(domain, width, height);
          for (const item of labels) {
            positionAxisLabel(item, edges[item.axis], width, height);
          }
        }
      };
    }

    function createAxisLabelElement(text, style) {
      const el = document.createElement("div");
      el.className = `scene3d-axis-label${style.title ? " scene3d-axis-title" : ""}`;
      el.textContent = text;
      el.style.fontSize = `${style.size || 10}px`;
      el.style.color = style.color || "#4D4D4D";
      if (style.family) el.style.fontFamily = style.family;
      return el;
    }

    function positionAxisLabel(item, edgeSpec, width, height) {
      if (!edgeSpec) {
        item.el.style.display = "none";
        return;
      }
      const start = dataArrayToDisplayVector(edgeSpec.start);
      const end = dataArrayToDisplayVector(edgeSpec.end);
      const point = dataArrayToDisplayVector(edgePoint(edgeSpec, item.value));
      const s = worldToViewport(start, width, height);
      const e = worldToViewport(end, width, height);
      const p = worldToViewport(point, width, height);
      const dx = e.x - s.x;
      const dy = e.y - s.y;
      const len = Math.hypot(dx, dy);
      if (!Number.isFinite(p.z) || p.z < -1 || p.z > 1 || len < 0.5) {
        item.el.style.display = "none";
        return;
      }
      const ux = dx / len;
      const uy = dy / len;
      let nx = -uy;
      let ny = ux;
      const cx = width / 2;
      const cy = height / 2;
      if ((p.x - cx) * nx + (p.y - cy) * ny < 0) {
        nx *= -1;
        ny *= -1;
      }
      let angle = Math.atan2(uy, ux) * 180 / Math.PI;
      if (angle > 90 || angle < -90) angle += 180;
      const margin = item.title ? 28 : 18;
      const x = Math.round(THREE.MathUtils.clamp(p.x + nx * item.offset, margin, width - margin) * 2) / 2;
      const y = Math.round(THREE.MathUtils.clamp(p.y + ny * item.offset, margin, height - margin) * 2) / 2;
      angle = Math.round(angle * 10) / 10;
      item.el.style.display = "block";
      item.el.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%) rotate(${angle}deg)`;
    }

    function worldToViewport(vec, width, height) {
      const projected = vec.clone().project(camera);
      return {
        x: (projected.x * 0.5 + 0.5) * width,
        y: (-projected.y * 0.5 + 0.5) * height,
        z: projected.z
      };
    }

    function axisPoint(axis, value, origin) {
      const point = [origin[0], origin[1], origin[2]];
      point[axisIndex(axis)] = value;
      return point;
    }

    function offsetAxisLabelPosition(axis, point, domain, fraction) {
      const out = [point[0], point[1], point[2]];
      const sideAxes = ["x", "y", "z"].filter((candidate) => candidate !== axis);
      for (const sideAxis of sideAxes) {
        const range = domain[sideAxis] || [-1, 1];
        const span = Math.max(Math.abs(Number(range[1]) - Number(range[0])), 1);
        out[axisIndex(sideAxis)] += span * fraction;
      }
      return out;
    }

    function formatTick(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      if (Math.abs(number) >= 100 || Math.abs(number) < 0.01 && number !== 0) return number.toExponential(1);
      return Number(number.toPrecision(3)).toString();
    }

    const gridLines = sceneData.panels?.dynamicBackFaces === true
      ? null
      : buildGridLines(sceneData.axes?.grid, sceneData.theme);
    if (gridLines) sceneGroup.add(gridLines);
    const axisLines = buildAxisLines(sceneData.axes, sceneData.coordinateSystem, sceneData.theme);
    sceneGroup.add(axisLines.group);
    const axisSprites = buildAxisSprites(sceneData.axes, sceneData.coordinateSystem, sceneData.theme);

    function buildAbsAnnotations(sceneData, camera, renderer) {
      const group = new THREE.Group();
      group.name = "abs-annotations";
      const annotations = [];
      const absLayers = (sceneData.layers || []).filter((layer) => layer.visible !== false && layer.type === "abs_annotation");

      for (const layer of absLayers) {
        const style = layer.style || {};
        const lineStyle = style.line || {};
        const pointStyle = style.point || {};
        const textStyle = style.text || {};
        const occlusion = layer.occlusion || {};
        const leaderDepthTest = lineStyle.depthTest ?? (occlusion.leader || layer.space?.occlusion) === "depth-test";
        const anchorDepthTest = pointStyle.depthTest ?? (occlusion.anchor || layer.space?.occlusion) === "depth-test";
        const labelDepthTest = textStyle.depthTest ?? (occlusion.label || "none") === "depth-test";
        const leaderMaterial = new THREE.MeshBasicMaterial({
          color: new THREE.Color(lineStyle.color || "#111827"),
          transparent: (lineStyle.opacity ?? 1) < 1,
          opacity: lineStyle.opacity ?? 1,
          depthTest: leaderDepthTest,
          depthWrite: false,
          side: THREE.DoubleSide
        });
        const pointMaterial = new THREE.PointsMaterial({
          color: new THREE.Color(pointStyle.color || "#111827"),
          size: pointStyle.size || 5,
          sizeAttenuation: false,
          depthTest: anchorDepthTest,
          depthWrite: true
        });

        for (const anchor of layer.data?.anchors || []) {
          const route = anchor.route || layer.route || [];
          const maxSegments = Math.max(1, route.length);
          const leaderPositions = new Float32Array(maxSegments * 6 * 3);
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute("position", new THREE.BufferAttribute(leaderPositions, 3));
          geometry.setDrawRange(0, 6);
          const leader = new THREE.Mesh(geometry, leaderMaterial.clone());
          group.add(leader);

          let point = null;
          if (pointStyle.visible !== false) {
            const pointGeometry = new THREE.BufferGeometry();
            const anchorDisplay = dataArrayToDisplayVector(anchor.position || [0, 0, 0]);
            pointGeometry.setAttribute("position", new THREE.Float32BufferAttribute(anchorDisplay.toArray(), 3));
            point = new THREE.Points(pointGeometry, pointMaterial.clone());
            group.add(point);
          }

          const labelSprite = createAbsLabelSprite(anchor.label?.text || "", textStyle);
          group.add(labelSprite);

          annotations.push({
            layer,
            anchor,
            leader,
            point,
            labelSprite,
            leaderPositions,
            maxSegments
          });
        }
      }

      scene.add(group);

      function update() {
        const rect = renderer.domElement.getBoundingClientRect();
        const width = Math.max(rect.width, 1);
        const height = Math.max(rect.height, 1);

        for (const item of annotations) {
          const anchorWorld = dataArrayToDisplayVector(item.anchor.position || [0, 0, 0]);
          const anchorNdc = anchorWorld.clone().project(camera);
          const route = item.anchor.route || item.layer.route || [];
          let sx = (anchorNdc.x + 1) * 0.5 * width;
          let sy = (-anchorNdc.y + 1) * 0.5 * height;
          const depth = anchorNdc.z;
          const worldPoints = [anchorWorld.clone()];
          const screenPoints = [{ x: sx, y: sy }];

          for (const command of route) {
            if (command.op === "move_anchor") {
              sx = (anchorNdc.x + 1) * 0.5 * width;
              sy = (-anchorNdc.y + 1) * 0.5 * height;
            } else if (command.op === "screen_up") {
              sy -= Number(command.dy || 0);
            } else if (command.op === "screen_down") {
              sy += Number(command.dy || 0);
            } else if (command.op === "screen_right") {
              sx += Number(command.dx || 0);
            } else if (command.op === "screen_left") {
              sx -= Number(command.dx || 0);
            } else if (command.op === "screen_offset") {
              sx += Number(command.dx || 0);
              sy += Number(command.dy || 0);
            } else {
              continue;
            }
            screenPoints.push({ x: sx, y: sy });
            worldPoints.push(unprojectScreenAtDepth(sx, sy, depth, width, height, camera));
          }

          let positionIndex = 0;
          const leaderWidth = Number(item.layer.style?.line?.width || 2);
          for (let i = 0; i < screenPoints.length - 1; i += 1) {
            positionIndex = writeRibbonSegment(
              item.leaderPositions,
              positionIndex,
              screenPoints[i],
              screenPoints[i + 1],
              depth,
              width,
              height,
              camera,
              leaderWidth
            );
          }
          for (let i = positionIndex; i < item.leaderPositions.length; i += 1) {
            item.leaderPositions[i] = 0;
          }
          item.leader.geometry.setDrawRange(0, Math.max(0, positionIndex / 3));
          item.leader.geometry.attributes.position.needsUpdate = true;
          item.leader.geometry.computeBoundingSphere();

          const labelPoint = screenPoints[screenPoints.length - 1] || screenPoints[0];
          const labelOffset = item.anchor.label?.offset || item.layer.label?.offset || [12, 0];
          const visible = Number.isFinite(anchorNdc.z) && anchorNdc.z >= -1 && anchorNdc.z <= 1;
          const sprite = item.labelSprite;
          const labelX = labelPoint.x + Number(labelOffset[0] || 0) + sprite.userData.pixelWidth / 2;
          const labelY = labelPoint.y + Number(labelOffset[1] || 0);
          const labelWorld = unprojectScreenAtDepth(labelX, labelY, depth, width, height, camera);
          sprite.position.copy(labelWorld);
          updateAbsLabelSpriteScale(sprite, labelWorld, camera, width, height);
          sprite.visible = visible;
        }
      }

      return { group, update };
    }

    function writeRibbonSegment(out, offset, a, b, ndcDepth, width, height, camera, widthPx) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const len = Math.hypot(dx, dy);
      if (!Number.isFinite(len) || len <= 0.001) return offset;
      const half = Math.max(widthPx, 1) / 2;
      const nx = -dy / len * half;
      const ny = dx / len * half;

      const p1 = unprojectScreenAtDepth(a.x + nx, a.y + ny, ndcDepth, width, height, camera);
      const p2 = unprojectScreenAtDepth(a.x - nx, a.y - ny, ndcDepth, width, height, camera);
      const p3 = unprojectScreenAtDepth(b.x + nx, b.y + ny, ndcDepth, width, height, camera);
      const p4 = unprojectScreenAtDepth(b.x - nx, b.y - ny, ndcDepth, width, height, camera);
      return writeTrianglePair(out, offset, p1, p2, p3, p2, p4, p3);
    }

    function writeTrianglePair(out, offset, ...points) {
      for (const point of points) {
        out[offset++] = point.x;
        out[offset++] = point.y;
        out[offset++] = point.z;
      }
      return offset;
    }

    function createAbsLabelSprite(text, textStyle) {
      const fontSize = textStyle.size || 12;
      const paddingX = 7;
      const paddingY = 5;
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      context.font = `${fontSize}px Inter, system-ui, sans-serif`;
      const metrics = context.measureText(text);
      const width = Math.ceil(metrics.width + paddingX * 2);
      const height = Math.ceil(fontSize + paddingY * 2);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.ceil(width * dpr);
      canvas.height = Math.ceil(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      context.scale(dpr, dpr);
      context.font = `${fontSize}px Inter, system-ui, sans-serif`;
      context.textBaseline = "middle";

      if (textStyle.background !== false) {
        context.fillStyle = textStyle.backgroundColor || "rgba(255,255,255,0.94)";
        context.strokeStyle = textStyle.borderColor || "#D1D5DB";
        drawRoundRect(context, 0.5, 0.5, width - 1, height - 1, 4);
        context.fill();
        context.stroke();
      }

      context.fillStyle = textStyle.color || "#111827";
      context.fillText(text, paddingX, height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthTest: textStyle.depthTest === true,
        depthWrite: false
      });
      const sprite = new THREE.Sprite(material);
      sprite.renderOrder = 1000;
      sprite.userData.pixelWidth = width;
      sprite.userData.pixelHeight = height;
      return sprite;
    }

    function createAxisTextSprite(text, textStyle) {
      const sprite = createAbsLabelSprite(text, textStyle);
      sprite.renderOrder = 900;
      return sprite;
    }

    function updateAbsLabelSpriteScale(sprite, worldPosition, camera, width, height) {
      let worldPerPixel;
      if (camera.isOrthographicCamera) {
        worldPerPixel = (camera.top - camera.bottom) / (height * camera.zoom);
      } else {
        const distance = camera.position.distanceTo(worldPosition);
        const visibleHeight = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2) * distance;
        worldPerPixel = visibleHeight / height;
      }
      sprite.scale.set(
        sprite.userData.pixelWidth * worldPerPixel,
        sprite.userData.pixelHeight * worldPerPixel,
        1
      );
    }

    function drawRoundRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + width - radius, y);
      context.quadraticCurveTo(x + width, y, x + width, y + radius);
      context.lineTo(x + width, y + height - radius);
      context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      context.lineTo(x + radius, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);
      context.closePath();
    }

    function unprojectScreenAtDepth(screenX, screenY, ndcDepth, width, height, camera) {
      return new THREE.Vector3(
        (screenX / width) * 2 - 1,
        -(screenY / height) * 2 + 1,
        ndcDepth
      ).unproject(camera);
    }

    let camera;
    let controls = null;
    let absAnnotations = null;
    const initialCamera = sceneData.camera || {};
    const orbit = {
      target: fit.center.clone(),
      radius: Math.max(fit.radius * 3.5, 1),
      azimuth: 0,
      elevation: 0,
      baseSpan: Math.max(fit.radius * (1.55 + 2 * (sceneData.view?.camera?.padding ?? 0.08)) / (initialCamera.zoom || 1), 1)
    };

    function makeCamera() {
      const width = Math.max(viewport.clientWidth, 1);
      const height = Math.max(viewport.clientHeight, 1);
      const aspect = width / height;
      const projection = initialCamera.projection || "orthographic";
      const zoom = initialCamera.zoom || 1;

      if (projection === "perspective") {
        return new THREE.PerspectiveCamera(
          initialCamera.fov || 35,
          aspect,
          initialCamera.near || 0.01,
          initialCamera.far || 10000
        );
      }

      const span = orbit.baseSpan;
      return new THREE.OrthographicCamera(
        -span * aspect / 2,
        span * aspect / 2,
        span / 2,
        -span / 2,
        initialCamera.near ? -initialCamera.far : -10000,
        initialCamera.far || 10000
      );
    }

    function resetView() {
      const pos = initialCamera.position || [1.8, -2.4, 1.6];
      const target = initialCamera.target || [fit.center.x, fit.center.y, fit.center.z];
      const displayPos = dataArrayToDisplayVector(pos);
      const displayTarget = dataArrayToDisplayVector(target);
      const distance = Math.max(fit.radius * 3.5, 1);
      const direction = displayPos.clone().sub(displayTarget).normalize();

      orbit.target.copy(displayTarget);
      camera.position.copy(orbit.target.clone().add(direction.multiplyScalar(distance)));
      camera.up.fromArray(initialCamera.up || [0, 0, 1]);
      setOrbitFromCamera();
      updateCameraFromOrbit();
      render();
    }

    function setOrbitFromCamera() {
      const offset = camera.position.clone().sub(orbit.target);
      orbit.radius = Math.max(offset.length(), 0.001);
      orbit.azimuth = Math.atan2(offset.y, offset.x);
      orbit.elevation = Math.asin(THREE.MathUtils.clamp(offset.z / orbit.radius, -1, 1));
    }

    function updateCameraFromOrbit() {
      const maxElevation = Math.PI / 2 - 0.02;
      orbit.elevation = THREE.MathUtils.clamp(orbit.elevation, -maxElevation, maxElevation);

      const cosElevation = Math.cos(orbit.elevation);
      const offset = new THREE.Vector3(
        orbit.radius * cosElevation * Math.cos(orbit.azimuth),
        orbit.radius * cosElevation * Math.sin(orbit.azimuth),
        orbit.radius * Math.sin(orbit.elevation)
      );
      camera.position.copy(orbit.target.clone().add(offset));
      camera.up.fromArray(initialCamera.up || [0, 0, 1]);
      camera.lookAt(orbit.target);
      camera.updateProjectionMatrix();
      render();
    }

    function resize() {
      const width = Math.max(viewport.clientWidth, 1);
      const height = Math.max(viewport.clientHeight, 1);
      renderer.setSize(width, height, false);

      const aspect = width / height;
      if (camera.isPerspectiveCamera) {
        camera.aspect = aspect;
      } else {
        const span = orbit.baseSpan;
        camera.left = -span * aspect / 2;
        camera.right = span * aspect / 2;
        camera.top = span / 2;
        camera.bottom = -span / 2;
      }
      camera.updateProjectionMatrix();
      render();
    }

    function installPointerOrbitControls() {
      const dom = renderer.domElement;
      const state = {
        target: orbit.target,
        dragging: false,
        pointerId: null,
        lastX: 0,
        lastY: 0
      };

      dom.addEventListener("contextmenu", (event) => event.preventDefault());
      dom.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse" && event.button !== 0) return;
        state.dragging = true;
        state.pointerId = event.pointerId;
        state.lastX = event.clientX;
        state.lastY = event.clientY;
        dom.classList.add("dragging");
        dom.setPointerCapture?.(event.pointerId);
        event.preventDefault();
      });

      dom.addEventListener("pointermove", (event) => {
        if (!state.dragging || event.pointerId !== state.pointerId) return;
        const dx = event.clientX - state.lastX;
        const dy = event.clientY - state.lastY;
        state.lastX = event.clientX;
        state.lastY = event.clientY;

        orbit.azimuth -= dx * 0.008;
        orbit.elevation += dy * 0.008;
        updateCameraFromOrbit();
      });

      function stopDrag(event) {
        if (state.pointerId !== null && event.pointerId !== state.pointerId) return;
        state.dragging = false;
        state.pointerId = null;
        dom.classList.remove("dragging");
      }

      dom.addEventListener("pointerup", stopDrag);
      dom.addEventListener("pointercancel", stopDrag);
      dom.addEventListener("wheel", (event) => {
        event.preventDefault();
        const scale = Math.exp(event.deltaY * 0.001);
        if (camera.isPerspectiveCamera) {
          orbit.radius = THREE.MathUtils.clamp(orbit.radius * scale, fit.radius * 0.25, fit.radius * 40);
        } else {
          camera.zoom = THREE.MathUtils.clamp(camera.zoom / scale, 0.2, 20);
        }
        updateCameraFromOrbit();
      }, { passive: false });

      return {
        target: state.target,
        update: updateCameraFromOrbit
      };
    }

    function render() {
      scenePanels?.update();
      axisLines?.update();
      axisSprites?.update();
      absAnnotations?.update();
      renderer.render(scene, camera);
    }

    function download(name, mime, content) {
      const a = document.createElement("a");
      const blob = content instanceof Blob ? content : new Blob([content], { type: mime });
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }

    camera = makeCamera();
    absAnnotations = buildAbsAnnotations(sceneData, camera, renderer);
    resetView();
    resize();
    controls = installPointerOrbitControls();
    fallback.remove();
    status.textContent = "Scene3D renderer ready; drag to rotate, wheel to zoom";
    window.__scene3dReady = true;
    document.body.dataset.rendererReady = "true";

    window.addEventListener("resize", resize);
    document.getElementById("reset-view").addEventListener("click", resetView);
    document.getElementById("export-png").addEventListener("click", () => {
      render();
      renderer.domElement.toBlob((blob) => download("scene3d.png", "image/png", blob));
    });
    document.getElementById("export-view").addEventListener("click", () => {
      const view = {
        schemaVersion: "0.1.0",
        view: sceneData.view?.camera?.view || null,
        camera: {
          projection: camera.isPerspectiveCamera ? "perspective" : "orthographic",
          position: camera.position.toArray(),
          target: orbit.target.toArray(),
          up: camera.up.toArray(),
          zoom: camera.zoom || initialCamera.zoom || 1,
          azimuth: sceneData.view?.camera?.azimuth,
          elevation: sceneData.view?.camera?.elevation,
          roll: sceneData.view?.camera?.roll
        }
      };
      download("view.json", "application/json", JSON.stringify(view, null, 2));
    });

    render();
  </script>
</body>
</html>
